<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Section Delimiter Options</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: "Times New Roman", "Georgia", serif;
            background-color: #faf9f7;
            color: #2c2821;
            line-height: 1.6;
            padding: 2rem 1rem;
        }

        .container {
            max-width: 600px;
            margin: 0 auto;
        }

        .header {
            text-align: center;
            margin-bottom: 3rem;
            padding-bottom: 1.5rem;
            border-bottom: 1px solid #e8e6e1;
        }

        .header h1 {
            font-size: 1.75rem;
            font-weight: 400;
            margin-bottom: 0.5rem;
            letter-spacing: 0.02em;
        }

        .header p {
            font-size: 0.95rem;
            color: #6b6458;
            font-style: italic;
        }

        .delimiter-option {
            margin-bottom: 3rem;
            text-align: center;
        }

        .delimiter-label {
            font-size: 0.85rem;
            color: #8b8075;
            margin-bottom: 1rem;
            text-transform: uppercase;
            letter-spacing: 0.1em;
            font-weight: 400;
        }

        .delimiter {
            padding: 2rem 0;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        /* Individual delimiter styles */
        .triple-dots::before {
            content: "• • •";
            font-size: 1.2rem;
            letter-spacing: 0.8rem;
            color: #8b8075;
        }

        .ornamental-line {
            width: 120px;
            height: 1px;
            background: linear-gradient(to right, transparent, #8b8075 20%, #8b8075 80%, transparent);
            position: relative;
        }

        .ornamental-line::before {
            content: "";
            position: absolute;
            top: -2px;
            left: 50%;
            transform: translateX(-50%);
            width: 5px;
            height: 5px;
            background: #8b8075;
            border-radius: 50%;
        }

        .diamond::before {
            content: "◆";
            font-size: 0.8rem;
            color: #8b8075;
        }

        .flourish-line {
            position: relative;
            width: 80px;
            height: 1px;
            background: #8b8075;
        }

        .flourish-line::before,
        .flourish-line::after {
            content: "";
            position: absolute;
            top: -1px;
            width: 3px;
            height: 3px;
            background: #8b8075;
            border-radius: 50%;
        }

        .flourish-line::before {
            left: -6px;
        }

        .flourish-line::after {
            right: -6px;
        }

        .asterisk::before {
            content: "✱";
            font-size: 1rem;
            color: #8b8075;
        }

        .double-line {
            display: flex;
            flex-direction: column;
            gap: 3px;
        }

        .double-line::before,
        .double-line::after {
            content: "";
            width: 60px;
            height: 1px;
            background: #8b8075;
        }

        .wavy-line {
            width: 100px;
            height: 2px;
            background: repeating-linear-gradient(
                90deg,
                transparent,
                transparent 3px,
                #8b8075 3px,
                #8b8075 6px
            );
            position: relative;
        }

        .wavy-line::before {
            content: "";
            position: absolute;
            width: 100%;
            height: 100%;
            background: repeating-linear-gradient(
                90deg,
                transparent,
                transparent 2px,
                #8b8075 2px,
                #8b8075 4px
            );
            top: 1px;
        }

        .book-ornament {
            width: 80px;
            height: 20px;
            position: relative;
        }

        .book-ornament::before {
            content: "";
            position: absolute;
            top: 50%;
            left: 0;
            right: 0;
            height: 1px;
            background: #8b8075;
        }

        .book-ornament::after {
            content: "";
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%) rotate(45deg);
            width: 8px;
            height: 8px;
            border: 1px solid #8b8075;
            background: #faf9f7;
        }

        .section-break::before {
            content: "§";
            font-size: 1.1rem;
            color: #8b8075;
        }

        .elegant-dots {
            display: flex;
            gap: 8px;
            align-items: center;
        }

        .elegant-dots::before,
        .elegant-dots::after {
            content: "";
            width: 2px;
            height: 2px;
            background: #8b8075;
            border-radius: 50%;
        }

        .elegant-dots {
            position: relative;
        }

        .elegant-dots .center-dot {
            width: 3px;
            height: 3px;
            background: #8b8075;
            border-radius: 50%;
        }

        .elegant-dots .side-dot {
            width: 2px;
            height: 2px;
            background: #8b8075;
            border-radius: 50%;
        }

        @media (min-width: 768px) {
            body {
                padding: 3rem 2rem;
            }

            .header h1 {
                font-size: 2rem;
            }

            .delimiter-option {
                margin-bottom: 3.5rem;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>Section Delimiter Options</h1>
            <p>Choose an elegant separator for your journal sections</p>
        </div>

        <div class="delimiter-option">
            <div class="delimiter-label">Option 1</div>
            <div class="delimiter triple-dots"></div>
        </div>

        <div class="delimiter-option">
            <div class="delimiter-label">Option 2</div>
            <div class="delimiter">
                <div class="ornamental-line"></div>
            </div>
        </div>

        <div class="delimiter-option">
            <div class="delimiter-label">Option 3</div>
            <div class="delimiter diamond"></div>
        </div>

        <div class="delimiter-option">
            <div class="delimiter-label">Option 4</div>
            <div class="delimiter">
                <div class="flourish-line"></div>
            </div>
        </div>

        <div class="delimiter-option">
            <div class="delimiter-label">Option 5</div>
            <div class="delimiter asterisk"></div>
        </div>

        <div class="delimiter-option">
            <div class="delimiter-label">Option 6</div>
            <div class="delimiter">
                <div class="double-line"></div>
            </div>
        </div>

        <div class="delimiter-option">
            <div class="delimiter-label">Option 7</div>
            <div class="delimiter">
                <svg width="100" height="20" viewBox="0 0 100 20" xmlns="http://www.w3.org/2000/svg">
                    <path d="M10 10 Q30 5 50 10 T90 10" stroke="#8b8075" stroke-width="1" fill="none"/>
                    <circle cx="10" cy="10" r="1.5" fill="#8b8075"/>
                    <circle cx="90" cy="10" r="1.5" fill="#8b8075"/>
                </svg>
            </div>
        </div>

        <div class="delimiter-option">
            <div class="delimiter-label">Option 8</div>
            <div class="delimiter">
                <div class="book-ornament"></div>
            </div>
        </div>

        <div class="delimiter-option">
            <div class="delimiter-label">Option 9</div>
            <div class="delimiter section-break"></div>
        </div>

        <div class="delimiter-option">
            <div class="delimiter-label">Option 10</div>
            <div class="delimiter">
                <div style="display: flex; align-items: center; gap: 8px;">
                    <div style="width: 2px; height: 2px; background: #8b8075; border-radius: 50%;"></div>
                    <div style="width: 3px; height: 3px; background: #8b8075; border-radius: 50%;"></div>
                    <div style="width: 2px; height: 2px; background: #8b8075; border-radius: 50%;"></div>
                </div>
            </div>
        </div>
    </div>
</body>
</html>
